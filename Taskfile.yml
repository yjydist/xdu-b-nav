version: '3'

silent: true

tasks:
  start:
    desc: 运行 Go 服务
    cmd: go run ./cmd/server

  build:
    desc: 构建后端二进制
    cmd: go build -o server ./cmd/server

  test:
    desc: 运行 Go 单元测试
    cmd: go test ./... -v

  fmt:
    desc: 执行 Go 格式化
    cmd: go fmt ./...

  dev-all:
    desc: 一键启动后端与前端开发服务器
    cmd: bash scripts/dev-all.sh
