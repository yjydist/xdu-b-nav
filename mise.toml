min_version = "2026.3.9"

[tools]
go = "1.25"
node = "22"
pnpm = "10"
python = "3.12"

[tasks.start]
description = "运行 Go 服务"
run = "go run ./cmd/server"

[tasks.build]
description = "构建后端二进制"
run = "go build -o server ./cmd/server"

[tasks.test]
description = "运行 Go 单元测试"
run = "go test ./... -v"

[tasks.fmt]
description = "执行 Go 格式化"
run = "go fmt ./..."

[tasks."dev-all"]
description = "一键启动后端与前端开发服务器"
run = '''
#!/usr/bin/env bash
set -euo pipefail

cleanup() {
  if [[ -n "${backend_pid:-}" ]]; then
    kill "$backend_pid" >/dev/null 2>&1 || true
  fi
  if [[ -n "${frontend_pid:-}" ]]; then
    kill "$frontend_pid" >/dev/null 2>&1 || true
  fi
}

trap cleanup EXIT INT TERM

go run ./cmd/server &
backend_pid=$!

(cd frontend && pnpm dev --host 127.0.0.1 --strictPort) &
frontend_pid=$!

echo "后端: http://localhost:8080"
echo "前端: http://127.0.0.1:5173"

wait "$backend_pid" "$frontend_pid"
'''
